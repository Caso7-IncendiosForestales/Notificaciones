# ===================================================================
# CONFIGURACIÓN DEL MICROSERVICIO: MS-NOTIFICACIONES
# ===================================================================
spring.application.name=ms-notificaciones
server.port=8092

# -------------------------------------------------------------------
# CONFIGURACIÓN DE LA BASE DE DATOS (POSTGRESQL - CLUSTER NEON)
# -------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://ep-noisy-mountain-aqympuue-pooler.c-8.us-east-1.aws.neon.tech/db_abastecimiento?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_zKcU9ku8wMGW
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------------------
# CONFIGURACIÓN DE PERSISTENCIA (JPA / HIBERNATE)
# -------------------------------------------------------------------
# Mantiene la sincronización automática del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Habilita el logging de sentencias SQL formateadas en consola para auditoría
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Especificación del dialecto de base de datos para optimización de queries
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------------
# CONFIGURACIÓN DE SERVICIOS EXTERNOS
# -------------------------------------------------------------------
# Desactiva la integración con el servidor de descubrimiento Eureka en entorno local
eureka.client.enabled=false